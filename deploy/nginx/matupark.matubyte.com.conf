# matupark.matubyte.com — frontend Vue + API billing

upstream matupark_billing {
    server 127.0.0.1:3010;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name matupark.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matupark.matubyte.com;

    ssl_certificate /etc/letsencrypt/live/matupark.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matupark.matubyte.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/apps/MatuPark/dist;
    index index.html;
    client_max_body_size 4m;

    location /api/billing {
        proxy_pass http://matupark_billing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
